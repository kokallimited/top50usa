name: Daily Deal Update

on:
  schedule:
    - cron: "0 5 * * *"   # 5am UTC daily — gives time to finish before morning traffic
  workflow_dispatch:       # Manual trigger button in GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update-deals:
    runs-on: ubuntu-latest
    # Script sleeps 65s between each API call.
    # 22 categories × 2 calls × 65s = ~48 min per site, 2 sites = ~96 min.
    # Set timeout to 120 minutes to be safe.
    timeout-minutes: 120

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      # Run UK first
      - name: Fetch UK deals
        env:
          KEEPA_API_KEY:        ${{ secrets.KEEPA_API_KEY }}
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_TAG_UK }}
          SITE: uk
        run: python keepa_fetcher.py

      # Run US second (tokens refill during UK run, so US starts with fresh tokens)
      - name: Fetch US deals
        env:
          KEEPA_API_KEY:        ${{ secrets.KEEPA_API_KEY }}
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_TAG_US }}
          SITE: us
        run: python keepa_fetcher.py

      # Commit both JSON files back to the repo
      - name: Commit and push updated deals
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deals_uk.json deals_us.json
          git diff --staged --quiet || \
            git commit -m "chore: daily deal update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
